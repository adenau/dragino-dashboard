services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/adenau/dragino-dashboard:latest
    ports:
      - "${DRAGINO_WEB_PORT:-5000}:${DRAGINO_WEB_PORT:-5000}"
    environment:
      DRAGINO_ENV: prod
      DRAGINO_DATABASE_BACKEND: mysql
      DRAGINO_MYSQL_HOST: mysql
      DRAGINO_MYSQL_PORT: 3306
      DRAGINO_MYSQL_DATABASE: dragino
      DRAGINO_MYSQL_USER: dragino
      DRAGINO_MYSQL_PASSWORD: 
      DRAGINO_API_URL: ${DRAGINO_API_URL}
      DRAGINO_API_TOKEN: ${DRAGINO_API_TOKEN}
      DRAGINO_DEVICE_ID: ${DRAGINO_DEVICE_ID:-temp-sensor-001}
      DRAGINO_WEB_HOST: 0.0.0.0
      DRAGINO_WEB_PORT: ${DRAGINO_WEB_PORT:-5000}
      DRAGINO_COLLECTION_INTERVAL: ${DRAGINO_COLLECTION_INTERVAL:-900}
      DRAGINO_LOOKBACK_HOURS: ${DRAGINO_LOOKBACK_HOURS:-192}
    restart: unless-stopped
